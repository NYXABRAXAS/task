# =============================================================
#  ProHorizon Scope Tracker — Render Blueprint
#  Deploys: 1 Web Service (Node.js API + Frontend SPA)
#           1 PostgreSQL Database (managed by Render)
#
#  Usage:
#    1. Push this repo to GitHub
#    2. Go to render.com → New → Blueprint
#    3. Connect your GitHub repository
#    4. Click "Apply"  — Render provisions everything automatically
# =============================================================

services:
  - type: web
    name: prohorizon-scope-tracker
    env: node
    region: singapore          # Change to: oregon | frankfurt | ohio | virginia
    plan: free                 # Upgrade to starter/standard for production
    rootDir: .
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/v1/health

    autoDeploy: true           # Re-deploy on every GitHub push

    envVars:
      # ── Application ────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"          # Render injects its own PORT; this is a fallback

      # ── Security (auto-generated — never share these) ──────
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: "12"

      # ── JWT expiry ─────────────────────────────────────────
      - key: JWT_EXPIRES_IN
        value: "8h"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"

      # ── Database — linked automatically ───────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: prohorizon-db
          property: connectionString

      # ── File upload ────────────────────────────────────────
      - key: UPLOAD_MAX_SIZE
        value: "10485760"
      - key: UPLOAD_PATH
        value: "./uploads"
      - key: ALLOWED_FILE_TYPES
        value: "pdf,doc,docx,xls,xlsx,png,jpg,jpeg,txt,csv"

      # ── Rate limiting ──────────────────────────────────────
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "500"
      - key: AUTH_RATE_LIMIT_MAX
        value: "10"

      # ── Account lock ───────────────────────────────────────
      - key: MAX_FAILED_LOGIN_ATTEMPTS
        value: "5"
      - key: ACCOUNT_LOCK_DURATION_MINUTES
        value: "30"

      # ── Logging ────────────────────────────────────────────
      - key: LOG_LEVEL
        value: "warn"
      - key: LOG_PATH
        value: "./logs"

      # ── Features ───────────────────────────────────────────
      - key: SWAGGER_ENABLED
        value: "false"
      - key: AUTO_SEED
        value: "true"           # Auto-seed on first boot if DB is empty

      # ── Email (set manually in Render dashboard after deploy)
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: EMAIL_FROM_NAME
        value: "ProHorizon Scope Tracker"
      - key: EMAIL_FROM_ADDRESS
        value: "noreply@yourdomain.com"

databases:
  - name: prohorizon-db
    databaseName: prohorizon_db
    user: prohorizon_user
    plan: free                 # Render free PostgreSQL — 90 day expiry; upgrade for production
    region: singapore
