# ================================================================
#  ProHorizon Scope Tracker — Render Blueprint
#  https://render.com/docs/blueprint-spec
#
#  HOW TO DEPLOY:
#  1. Push this repo to GitHub
#  2. Render Dashboard → New → Blueprint
#  3. Connect your GitHub repo → click "Apply"
#  4. Render creates the web service + PostgreSQL automatically
#  5. Wait ~3 minutes → app is live
#
#  DATABASE_URL is injected automatically via fromDatabase below.
#  You do NOT need to set it manually.
# ================================================================

services:
  - type: web
    name: prohorizon-scope-tracker
    env: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /api/v1/health
    autoDeploy: true

    envVars:
      # ── Node environment ───────────────────────────────────
      - key: NODE_ENV
        value: production

      # ── Database (auto-injected from linked PostgreSQL DB) ─
      - key: DATABASE_URL
        fromDatabase:
          name: prohorizon-db
          property: connectionString

      # ── Secrets (auto-generated by Render on first deploy) ─
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

      # ── JWT config ─────────────────────────────────────────
      - key: JWT_EXPIRES_IN
        value: "8h"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: BCRYPT_ROUNDS
        value: "12"

      # ── Rate limiting ──────────────────────────────────────
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "500"
      - key: AUTH_RATE_LIMIT_MAX
        value: "10"

      # ── Account security ───────────────────────────────────
      - key: MAX_FAILED_LOGIN_ATTEMPTS
        value: "5"
      - key: ACCOUNT_LOCK_DURATION_MINUTES
        value: "30"

      # ── File uploads ───────────────────────────────────────
      - key: UPLOAD_MAX_SIZE
        value: "10485760"
      - key: UPLOAD_PATH
        value: "./uploads"
      - key: ALLOWED_FILE_TYPES
        value: "pdf,doc,docx,xls,xlsx,png,jpg,jpeg,txt,csv"

      # ── Logging ────────────────────────────────────────────
      - key: LOG_LEVEL
        value: "warn"
      - key: LOG_PATH
        value: "./logs"

      # ── Features ───────────────────────────────────────────
      - key: SWAGGER_ENABLED
        value: "false"
      - key: AUTO_SEED
        value: "true"

      # ── Email (fill in after deploy if needed) ─────────────
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: EMAIL_FROM_NAME
        value: "ProHorizon Scope Tracker"
      - key: EMAIL_FROM_ADDRESS
        value: "noreply@prohorizon.com"

databases:
  - name: prohorizon-db
    databaseName: prohorizon_db
    user: prohorizon_user
    plan: free
    region: singapore
