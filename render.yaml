# =============================================================
#  ProHorizon Scope Tracker — Render Blueprint
#  Deploy: New → Blueprint → connect GitHub repo → Apply
# =============================================================

services:
  - type: web
    name: prohorizon-scope-tracker
    env: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /api/v1/health

    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: JWT_EXPIRES_IN
        value: "8h"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"

      - key: DATABASE_URL
        fromDatabase:
          name: prohorizon-db
          property: connectionString

      - key: UPLOAD_MAX_SIZE
        value: "10485760"
      - key: UPLOAD_PATH
        value: "./uploads"
      - key: ALLOWED_FILE_TYPES
        value: "pdf,doc,docx,xls,xlsx,png,jpg,jpeg,txt,csv"

      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "500"
      - key: AUTH_RATE_LIMIT_MAX
        value: "10"

      - key: MAX_FAILED_LOGIN_ATTEMPTS
        value: "5"
      - key: ACCOUNT_LOCK_DURATION_MINUTES
        value: "30"

      - key: LOG_LEVEL
        value: "warn"
      - key: LOG_PATH
        value: "./logs"

      - key: SWAGGER_ENABLED
        value: "false"
      - key: AUTO_SEED
        value: "true"

      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: EMAIL_FROM_NAME
        value: "ProHorizon Scope Tracker"
      - key: EMAIL_FROM_ADDRESS
        value: "noreply@prohorizon.com"

databases:
  - name: prohorizon-db
    databaseName: prohorizon_db
    user: prohorizon_user
    plan: free
    region: singapore
